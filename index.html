<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Lynx Video</title>

  <style>
    body {
      margin: 0;
      scroll-snap-type: y mandatory;
      overflow-y: scroll;
      font-family: Arial;

      background-image: url("phong.jpg");
      background-size: cover;
      background-position: center;
    }

    .video-container {
      height: 100vh;
      scroll-snap-align: start;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    video {
      width: 300px;
      height: 500px;
      object-fit: cover;
      border-radius: 15px;
      border: 3px solid white;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
  </style>
</head>

<body>
